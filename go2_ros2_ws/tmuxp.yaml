session_name: go2
global_options:
  mouse: on
  set-clipboard: on
  default-terminal: screen-256color
windows:
  - window_name: main
    layout: tiled
    shell_command_before:
      - source ${ROS2_WS}/scripts/setup.sh
    panes:
      - shell_command:
          - ros2 launch bringup launch_rviz.py
      - shell_command:
          - ros2 launch bringup launch_state_machine.py
      - shell_command:
        - '[ "$MOCAP" = "true" ] && ros2 launch vrpn_mocap client.launch.yaml server:=$MOCAP_IP || echo "Motion capture disabled"'
      - focus: true
        shell_command:
          - history -s "ros2 launch bringup launch_go2.py"
          - cmd: "ros2 launch bringup launch_go2.py"
            enter: false
      - shell_command:
          - history -s "ros2 launch bringup launch_control.py"
          - cmd: "ros2 launch bringup launch_control.py"
            enter: false
      - pane